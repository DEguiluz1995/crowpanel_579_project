[env:freenove_esp32_s3_wroom]
platform = espressif32
board = freenove_esp32_s3_wroom
framework = arduino

monitor_speed = 115200
upload_speed = 921600

upload_port = COM6
monitor_port = COM6

build_unflags =
    -DARDUINO_USB_CDC_ON_BOOT

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM

lib_deps =
    bblanchon/ArduinoJson